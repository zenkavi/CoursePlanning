<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CMC Course Planner{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .scrollbar-thin::-webkit-scrollbar { height: 6px; width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: #f1f5f9; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 text-sm">

  {# ── Top bar ───────────────────────────────────────────────────────── #}
  <header class="bg-white border-b border-slate-200 px-4 py-2 flex items-center gap-4 z-30 sticky top-0">
    <span class="font-bold text-base tracking-tight text-indigo-700">CMC Integrated Science Planner</span>
    <span class="text-slate-300">|</span>
    {% block topbar %}{% endblock %}
    <div class="ml-auto flex items-center gap-2">
      <a href="/" class="px-3 py-1 rounded text-slate-600 hover:bg-slate-100 {% if request.path == '/' %}font-semibold text-indigo-700{% endif %}">Grid</a>
      <a href="/diagnostics" class="px-3 py-1 rounded text-slate-600 hover:bg-slate-100 {% if request.path == '/diagnostics' %}font-semibold text-indigo-700{% endif %}">Diagnostics</a>
    </div>
  </header>

  {% block content %}{% endblock %}

</body>
</html>
